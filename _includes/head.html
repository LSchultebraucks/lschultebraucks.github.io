<head>

  <title>
    {% if page.title == "Home" %}
      {{ site.title }}
    {% else %}
      {{ page.title }} | {{ site.title }}
    {% endif %}
  </title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">
  <link rel="alternate icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/img/favicon.svg' | relative_url }}">

  <!-- Theme boot script to avoid flash; default to dark -->
  <script>
    (function() {
      try {
        var theme = localStorage.getItem('theme');
        if (!theme) {
          theme = 'dark';
          localStorage.setItem('theme', theme);
        }
        var root = document.documentElement;
        root.classList.remove('theme-dark','theme-light');
        root.classList.add(theme === 'dark' ? 'theme-dark' : 'theme-light');
      } catch (e) {
        // if localStorage is unavailable, fall back to dark
        document.documentElement.classList.add('theme-dark');
      }
    })();
  </script>

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.github.build_revision | default: site.time | date: '%s' }}">
  <link rel="stylesheet" href="{{ '/assets/css/syntax.css' | relative_url }}?v={{ site.github.build_revision | default: site.time | date: '%s' }}">
  <!-- Use Atom -->
  {% feed_meta %}
  <!-- Use RSS-2.0 -->
  <!--<link href="{{ site.github.url }}/rss-feed.xml" type="application/rss+xml" rel="alternate" title="{{ site.title }} | {{ site.description }}"/>
  //-->

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <script type="text/javascript" async
    src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-MML-AM_CHTML">
    MathJax.Hub.Config({
        tex2jax: {
          inlineMath: [['$', '$'], ['\\(', '\\)']]
        }
      });
  </script>

  <!-- Google Analytics -->
  {% include google-analytics.html %}

  <!-- Use Jekyll SEO plugin -->
  {% seo %}

  <!-- Fallback when JavaScript is disabled: apply the dark palette via the
       same CSS variables the themed design uses, hide the toggle, and reveal
       the body (which is opacity:0 until the page-loaded class is set by JS). -->
  <noscript>
    <style>
      #theme-toggle { display: none !important; }
      body { opacity: 1 !important; }

      :root {
        --bg-primary: #0b0b0f;
        --bg-secondary: #14141b;
        --bg-elevated: #1b1b24;
        --bg-code: #15151c;

        --text-primary: #f5f5f7;
        --text-secondary: #a1a1aa;
        --text-tertiary: #71717a;

        --accent-primary: #8b7cff;
        --accent-hover: #a594ff;
        --accent-subtle: #1d1a3a;

        --border-light: #26262f;
        --border-medium: #34343f;
        --border-dark: #4a4a57;

        --glow: rgba(139, 124, 255, 0.16);
      }
    </style>
  </noscript>

</head>
